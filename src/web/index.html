<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Proxy Manager</title>
<style>
/* ── CSS custom properties (dark default) ─────────────────────────────────── */
:root {
  --bg:           #0a0a0a;
  --bg2:          #111111;
  --bg3:          #0d0d0d;
  --border:       #222222;
  --border2:      #1a1a1a;
  --text:         #e0e0e0;
  --text-h:       #ffffff;
  --text-dim:     #888888;
  --text-faint:   #555555;
  --text-faintest:#333333;
  --green:        #22c55e;
  --green-bg:     #0d1f12;
  --green-dim:    #14532d;
  --blue:         #3b82f6;
  --yellow:       #eab308;
  --yellow-bg:    #422006;
  --red:          #ef4444;
  --red-bg:       #1a0000;
  --red-dim:      #1c0000;
  --orange:       #f97316;
  --indigo:       #6366f1;
  --indigo-dim:   #1e293b;
  --indigo-bg:    #0d1530;
  --pink:         #e879f9;
  --purple:       #c084fc;
  --log-bg:       #0d0d0d;
  --log-entry-border: #111111;
  --log-4xx-bg:   #1a0000;
  --log-429-bg:   #1a1100;
  --log-5xx-bg:   #1a0d00;
  --log-ev-switch-bg: #0d1530;
  --log-ev-acct-bg:   #0d1a0d;
  --snippet-bg:   #1a0000;
  --snippet-text: #f87171;
  --btn-secondary-bg:  #1e293b;
  --btn-secondary-txt: #94a3b8;
}

[data-theme="light"] {
  --bg:           #f1f5f9;
  --bg2:          #ffffff;
  --bg3:          #f8fafc;
  --border:       #e2e8f0;
  --border2:      #e9edf1;
  --text:         #1e293b;
  --text-h:       #0f172a;
  --text-dim:     #475569;
  --text-faint:   #94a3b8;
  --text-faintest:#cbd5e1;
  --green:        #16a34a;
  --green-bg:     #f0fdf4;
  --green-dim:    #bbf7d0;
  --blue:         #2563eb;
  --yellow:       #ca8a04;
  --yellow-bg:    #fefce8;
  --red:          #dc2626;
  --red-bg:       #fff1f2;
  --red-dim:      #fee2e2;
  --orange:       #ea580c;
  --indigo:       #4f46e5;
  --indigo-dim:   #e0e7ff;
  --indigo-bg:    #eef2ff;
  --pink:         #c026d3;
  --purple:       #7c3aed;
  --log-bg:       #f8fafc;
  --log-entry-border: #e9edf1;
  --log-4xx-bg:   #fff1f2;
  --log-429-bg:   #fefce8;
  --log-5xx-bg:   #fff7ed;
  --log-ev-switch-bg: #eef2ff;
  --log-ev-acct-bg:   #f0fdf4;
  --snippet-bg:   #fff1f2;
  --snippet-text: #dc2626;
  --btn-secondary-bg:  #e2e8f0;
  --btn-secondary-txt: #475569;
}

/* ── Reset & base ─────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 17px; font-weight: 600; color: var(--text-h); flex: 1; }
.badge {
  background: var(--green); color: #fff;
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 99px; text-transform: uppercase;
}
.badge.offline { background: var(--red); }

/* Theme toggle */
#theme-btn {
  background: var(--indigo-dim); color: var(--indigo);
  border: none; border-radius: 6px; padding: 5px 10px;
  font-size: 15px; cursor: pointer; line-height: 1;
  transition: opacity 0.15s;
}
#theme-btn:hover { opacity: 0.75; }

/* ── Layout ──────────────────────────────────────────────────────────────── */
.container { max-width: 960px; margin: 0 auto; padding: 24px; }

/* ── Stats ───────────────────────────────────────────────────────────────── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
}
.stat-card .label {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 8px;
}
.stat-card .value {
  font-size: 28px; font-weight: 700; color: var(--text-h);
  font-variant-numeric: tabular-nums;
}
.stat-card .value.green  { color: var(--green); }
.stat-card .value.yellow { color: var(--yellow); }
.stat-card .value.red    { color: var(--red); }

/* ── Sections ────────────────────────────────────────────────────────────── */
section { margin-bottom: 28px; }
section h2 {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
}

/* ── Account cards ───────────────────────────────────────────────────────── */
.account-list { display: flex; flex-direction: column; gap: 8px; }
.account-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: border-color 0.15s, background 0.15s;
}
.account-card.selected    { border-color: var(--green); background: var(--green-bg); }
.account-card.rate_limited{ border-color: var(--yellow); }
.account-card.expired     { border-color: var(--red); opacity: 0.7; }

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--border); color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.account-card.selected .avatar { background: var(--green-dim); color: var(--green); }

.account-info { flex: 1; min-width: 0; }
.account-info .email {
  font-size: 14px; font-weight: 500; color: var(--text-h);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.account-info .meta { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
.usage-bars {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 8px; max-width: 420px;
}
.usage-row { min-width: 0; }
.usage-label {
  display: flex; justify-content: space-between; gap: 8px;
  color: var(--text-faint); font-size: 10px; line-height: 1.2;
  margin-bottom: 4px; text-transform: uppercase;
}
.usage-label span:last-child {
  color: var(--text-dim); font-variant-numeric: tabular-nums;
}
.usage-track {
  height: 5px; border-radius: 99px; overflow: hidden;
  background: var(--border);
}
.usage-fill {
  height: 100%; width: var(--usage-pct);
  background: var(--green); border-radius: inherit;
}
.usage-fill.blue { background: var(--blue); }
.usage-fill.green { background: var(--green); }
.usage-fill.yellow { background: var(--yellow); }
.usage-fill.orange { background: var(--orange); }
.usage-fill.red { background: var(--red); }
.usage-fill.warn { background: var(--yellow); }
.usage-fill.full { background: var(--red); }

.running-spinner {
  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid var(--green-dim);
  border-top-color: var(--green);
  flex-shrink: 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status-pill {
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 99px; text-transform: uppercase; flex-shrink: 0;
}
.status-pill.rate_limited { background: var(--yellow-bg); color: var(--yellow); }
.status-pill.expired      { background: var(--red-dim); color: var(--red); }

.actions { display: flex; gap: 6px; flex-shrink: 0; }
button {
  cursor: pointer; border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 13px; font-weight: 700;
  transition: filter 0.15s, transform 0.15s;
}
button:hover { filter: brightness(1.08); }
button:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-switch { background: #16a34a; color: #ffffff; }
.btn-remove { background: #dc2626; color: #ffffff; }
[data-theme="light"] .btn-switch { background: #15803d; color: #ffffff; }
[data-theme="light"] .btn-remove { background: #b91c1c; color: #ffffff; }

.empty { text-align: center; padding: 48px; color: var(--text-faint); }
.empty p { margin-top: 8px; font-size: 14px; }

/* ── Proxy URL bar ───────────────────────────────────────────────────────── */
.tool-bar {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px;
  margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.tool-name {
  color: var(--text-h); font-size: 15px; font-weight: 700;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.proxy-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.login-btn {
  background: #16a34a; color: #ffffff;
  font-size: 12px; padding: 5px 12px; flex-shrink: 0; white-space: nowrap;
}
[data-theme="light"] .login-btn { background: #15803d; color: #ffffff; }
.cancel-login-btn {
  display: none;
  background: #dc2626;
  color: #ffffff;
  font-size: 12px; padding: 5px 12px; flex-shrink: 0; white-space: nowrap;
}
[data-theme="light"] .cancel-login-btn { background: #b91c1c; color: #ffffff; }
.import-account-btn {
  background: #4f46e5;
  color: #ffffff;
  font-size: 12px; padding: 5px 12px; flex-shrink: 0; white-space: nowrap;
}
[data-theme="light"] .import-account-btn { background: #4338ca; color: #ffffff; }
.copy-login-btn {
  background: #0e7490;
  color: #ffffff;
  font-size: 12px; padding: 5px 12px; flex-shrink: 0; white-space: nowrap;
}
[data-theme="light"] .copy-login-btn { background: #0c6280; color: #ffffff; }
.proxy-switch {
  display: flex; align-items: center; gap: 7px;
  color: var(--text-dim); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px; cursor: pointer; user-select: none; white-space: nowrap;
}
.proxy-switch input { display: none; }
.switch-track {
  width: 34px; height: 19px; border-radius: 99px;
  background: var(--border); position: relative; flex-shrink: 0;
  transition: background 0.15s;
}
.switch-knob {
  width: 15px; height: 15px; border-radius: 50%;
  background: var(--text-dim); position: absolute; top: 2px; left: 2px;
  transition: transform 0.15s, background 0.15s;
}
.proxy-switch input:checked + .switch-track { background: var(--green-dim); }
.proxy-switch input:checked + .switch-track .switch-knob {
  transform: translateX(15px);
  background: var(--green);
}
.proxy-switch.disabled { opacity: 0.45; cursor: not-allowed; }
.proxy-switch.disabled .switch-track { pointer-events: none; }
@media (max-width: 720px) {
  .tool-bar { align-items: stretch; flex-direction: column; }
  .proxy-actions { flex-wrap: wrap; }
}

/* ── Log box ─────────────────────────────────────────────────────────────── */
.log-box {
  background: var(--log-bg); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 12px;
  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 12px; line-height: 1.7; max-height: 380px; overflow-y: auto;
  color: var(--text-faint);
}
.log-row { padding: 2px 0; border-bottom: 1px solid var(--log-entry-border); }
.log-row:last-child { border-bottom: none; }
.log-row.err-4xx { background: var(--log-4xx-bg); }
.log-row.err-429 { background: var(--log-429-bg); }
.log-row.err-5xx { background: var(--log-5xx-bg); }
.log-row.ev-switch { background: var(--log-ev-switch-bg); border-left: 2px solid var(--indigo); padding-left: 8px; }
.log-row.ev-account{ background: var(--log-ev-acct-bg);  border-left: 2px solid var(--green);  padding-left: 8px; }

/* Log token colours — theme-aware */
.lc-time   { color: var(--text-faintest); }
.lc-method { color: var(--text-dim); }
.lc-path   { color: var(--indigo); }
.lc-ok     { color: var(--green);  font-weight: 700; }
.lc-4xx    { color: var(--red);    font-weight: 700; }
.lc-429    { color: var(--yellow); font-weight: 700; }
.lc-5xx    { color: var(--orange); font-weight: 700; }
.lc-email  { color: var(--pink);   font-size: 11px; }
.lc-lat    { color: var(--text-faintest); font-size: 11px; }
.lc-sw-label { color: var(--indigo); font-weight: 700; }
.lc-sw-from  { color: var(--purple); }
.lc-sw-to    { color: var(--green); }
.lc-sw-reason{ color: var(--text-faint); font-size: 10px; }
.lc-ev-add   { color: var(--green);  font-weight: 700; }
.lc-ev-upd   { color: var(--green); }
.lc-ev-sel   { color: var(--green); }
.lc-ev-info  { color: var(--indigo); font-weight: 700; }
.lc-ev-err   { color: var(--red); font-weight: 700; }
.lc-arrow    { color: var(--text-faint); }

.badge-unhandled {
  background: #7f1d1d; color: #fca5a5;
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 4px; text-transform: uppercase; margin-left: 6px;
}
.badge-fallback {
  background: #78350f; color: #fcd34d;
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 4px; text-transform: uppercase; margin-left: 6px;
}

/* Error snippet */
.err-snippet {
  background: var(--snippet-bg); color: var(--snippet-text);
  border-radius: 4px; padding: 3px 8px; margin-top: 1px;
  font-size: 11px; white-space: pre-wrap; word-break: break-all;
  max-height: 72px; overflow-y: auto;
}
</style>
</head>
<body>
<header>
  <h1>Codex Proxy</h1>
  <span class="badge" id="server-badge">connecting...</span>
  <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
</header>

<div class="container">

  <div class="tool-bar">
    <span class="tool-name">Codex Proxy Manager</span>
    <div class="proxy-actions">
      <button class="login-btn" id="login-btn" onclick="startLogin()">Login</button>
      <button class="copy-login-btn" id="copy-login-btn" onclick="copyLoginLink()">Copy login link</button>
      <button class="cancel-login-btn" id="cancel-login-btn" onclick="cancelLogin()">Cancel</button>
      <button class="import-account-btn" id="import-account-btn" onclick="importAccountCallback()">Import account</button>
      <label class="proxy-switch" id="config-switch-label" title="Patch Codex config and restart Codex">
        <input type="checkbox" id="config-switch" onchange="toggleConfigProxy(this.checked)">
        <span class="switch-track"><span class="switch-knob"></span></span>
        <span id="config-switch-text">Proxy off</span>
      </label>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Đang dùng</div>
      <div class="value green" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Rate limited</div>
      <div class="value yellow" id="stat-limited">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Tổng request</div>
      <div class="value" id="stat-requests">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Tổng tài khoản</div>
      <div class="value" id="stat-total">—</div>
    </div>
  </div>

  <section>
    <h2>Tài khoản</h2>
    <div class="account-list" id="account-list">
      <div class="empty">
        <div style="font-size:32px">🔐</div>
        <p>Chưa có tài khoản. Đăng nhập vào Codex để thêm tự động.</p>
      </div>
    </div>
  </section>

  <section>
    <h2>Request log (realtime)</h2>
    <div class="log-box" id="log-box">
      <div class="lc-time" style="font-size:11px">Chờ request...</div>
    </div>
  </section>

</div>

<script>
// ── Theme ────────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('codex-proxy-theme', theme);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
// Init theme from localStorage
applyTheme(localStorage.getItem('codex-proxy-theme') || 'dark');

// ── Helpers ──────────────────────────────────────────────────────────────────
function timeAgo(ms) {
  if (!ms) return 'chưa dùng';
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return `${s}s trước`;
  if (s < 3600) return `${Math.floor(s / 60)}m trước`;
  return `${Math.floor(s / 3600)}h trước`;
}

function setConfigSwitchBusy(busy) {
  const input = document.getElementById('config-switch');
  const label = document.getElementById('config-switch-label');
  input.disabled = busy;
  label.classList.toggle('disabled', busy);
}

function renderConfigProxyStatus(enabled) {
  const input = document.getElementById('config-switch');
  const text = document.getElementById('config-switch-text');
  input.checked = Boolean(enabled);
  text.textContent = enabled ? 'Proxy on' : 'Proxy off';
}

async function updateConfigProxyStatus() {
  try {
    const data = await fetch('/api/config/status').then(r => r.json());
    renderConfigProxyStatus(data.enabled);
  } catch {}
}

async function toggleConfigProxy(enabled) {
  setConfigSwitchBusy(true);
  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled }),
    });
    const data = await res.json();
    if (!res.ok) {
      alert('Không cập nhật được config: ' + (data.error ?? 'unknown'));
      await updateConfigProxyStatus();
      return;
    }
    renderConfigProxyStatus(data.enabled);
  } catch {
    alert('Không cập nhật được config');
    await updateConfigProxyStatus();
  } finally {
    setConfigSwitchBusy(false);
  }
}

async function updateLoginStatus() {
  try {
    const data = await fetch('/api/login/status').then(r => r.json());
    const btn = document.getElementById('login-btn');
    const cancelBtn = document.getElementById('cancel-login-btn');
    btn.disabled = data.inProgress;
    btn.textContent = data.inProgress ? 'Logging in...' : 'Login';
    cancelBtn.style.display = data.inProgress ? 'inline-block' : 'none';
  } catch {}
}

async function startLogin() {
  const btn = document.getElementById('login-btn');
  const loginWindow = window.open('about:blank', '_blank');
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  try {
    const res = await fetch('/api/login', { method: 'POST' });
    const text = await res.text();
    let data = {};
    try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text || `HTTP ${res.status}` }; }
    if (!res.ok) {
      if (loginWindow) loginWindow.close();
      alert('Login lỗi: ' + (data.error ?? 'unknown'));
      await updateLoginStatus();
      return;
    }
    if (data.authorizeUrl) {
      if (loginWindow) loginWindow.location.href = data.authorizeUrl;
      else window.location.href = data.authorizeUrl;
    }
  } catch {
    if (loginWindow) loginWindow.close();
    alert('Không start được login flow');
    await updateLoginStatus();
  }
}

async function copyLoginLink() {
  const btn = document.getElementById('copy-login-btn');
  btn.disabled = true;
  btn.textContent = 'Đang tạo...';
  try {
    const res = await fetch('/api/login', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { alert('Lỗi: ' + (data.error ?? 'unknown')); return; }
    await navigator.clipboard.writeText(data.authorizeUrl);
    btn.textContent = 'Đã copy!';
    setTimeout(() => { btn.textContent = 'Copy login link'; btn.disabled = false; }, 2000);
  } catch {
    alert('Không copy được link');
    btn.textContent = 'Copy login link';
    btn.disabled = false;
  }
}

async function cancelLogin() {
  const cancelBtn = document.getElementById('cancel-login-btn');
  cancelBtn.disabled = true;
  try {
    await fetch('/api/login/cancel', { method: 'POST' });
  } catch {
    alert('Không cancel được login flow');
  } finally {
    cancelBtn.disabled = false;
    await updateLoginStatus();
  }
}

async function importAccountCallback() {
  const callbackUrl = prompt('Paste OpenAI callback URL');
  if (!callbackUrl) return;

  try {
    const res = await fetch('/api/login/import-callback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ callbackUrl }),
    });
    const data = await res.json();
    if (!res.ok) {
      alert('Import lỗi: ' + (data.error ?? 'unknown'));
      return;
    }
    alert(`Imported account: ${data.email}`);
    await fetchAccounts();
    await updateLoginStatus();
  } catch {
    alert('Không import được callback URL');
  }
}

// ── Accounts ─────────────────────────────────────────────────────────────────
let latestAccounts = [];
let latestAccountsFetchedAt = 0;

function usageBar(label, usage) {
  const count = usage?.count || 0;
  const limit = usage?.limit || 0;
  const rawPct = limit > 0 ? (count / limit) * 100 : 0;
  const pct = Math.max(0, Math.min(100, rawPct));
  const cls = pct >= 100 ? 'full' : (pct >= 80 ? 'warn' : '');
  const text = limit > 0 ? `${count.toLocaleString()}/${limit.toLocaleString()}` : count.toLocaleString();
  return `<div class="usage-row">
    <div class="usage-label"><span>${label}</span><span>${text}</span></div>
    <div class="usage-track"><div class="usage-fill ${cls}" style="--usage-pct:${pct}%"></div></div>
  </div>`;
}

function formatReset(seconds) {
  if (!Number.isFinite(seconds) || seconds <= 0) return '00:00:00';
  const total = Math.max(0, Math.floor(seconds));
  const days = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const minutes = Math.floor((total % 3600) / 60);
  const secs = total % 60;
  const time = [hours, minutes, secs].map(v => String(v).padStart(2, '0')).join(':');
  return days > 0 ? `${days}d ${time}` : time;
}

function liveResetSeconds(window) {
  const raw = Number(window?.resetAfterSeconds);
  if (!Number.isFinite(raw)) return 0;
  const elapsed = latestAccountsFetchedAt ? (Date.now() - latestAccountsFetchedAt) / 1000 : 0;
  return Math.max(0, raw - elapsed);
}

function quotaBar(label, window) {
  if (!window) return '';
  const usedPct = Math.max(0, Math.min(100, Number(window.usedPercent || 0)));
  const remainingPct = Math.max(0, Math.min(100, 100 - usedPct));
  const cls =
    remainingPct > 80 ? 'blue' :
    remainingPct > 50 ? 'green' :
    remainingPct > 30 ? 'yellow' :
    remainingPct > 10 ? 'orange' :
    'red';
  const reset = formatReset(liveResetSeconds(window));
  const text = reset ? `${remainingPct}% · ${reset}` : `${remainingPct}%`;
  return `<div class="usage-row" title="Reset in ${reset || 'unknown'}">
    <div class="usage-label"><span>${label}</span><span>${text}</span></div>
    <div class="usage-track"><div class="usage-fill ${cls}" style="--usage-pct:${remainingPct}%"></div></div>
  </div>`;
}

function accountUsageBars(a) {
  if (a.codexUsage?.error) {
    return `<div class="usage-bars">
      <div class="usage-row">
        <div class="usage-label"><span>Usage</span><span>${a.codexUsage.error}</span></div>
        <div class="usage-track"><div class="usage-fill full" style="--usage-pct:100%"></div></div>
      </div>
    </div>`;
  }

  if (a.codexUsage?.primaryWindow || a.codexUsage?.secondaryWindow) {
    return `<div class="usage-bars">
      ${quotaBar('Daily', a.codexUsage.primaryWindow)}
      ${quotaBar('Weekly', a.codexUsage.secondaryWindow)}
    </div>`;
  }

  return `<div class="usage-bars">
    ${usageBar('Daily', a.dailyUsage)}
    ${usageBar('Weekly', a.weeklyUsage)}
  </div>`;
}

function renderAccounts(accounts) {
  const list = document.getElementById('account-list');
  if (!accounts.length) {
    list.innerHTML = '<div class="empty"><div style="font-size:32px">🔐</div><p>Chưa có tài khoản. Đăng nhập vào Codex để thêm tự động.</p></div>';
    return;
  }
  list.innerHTML = accounts.map(a => {
    const isUsing = a.selected && a.status !== 'rate_limited' && a.status !== 'expired';
    const cardCls = isUsing ? 'selected' : (['rate_limited','expired'].includes(a.status) ? a.status : '');
    const meta = [
      a.chatgptPlanType?.toUpperCase() || '',
      a.requestCount ? `${a.requestCount.toLocaleString()} req` : '',
      timeAgo(a.lastUsed),
      (a.status === 'rate_limited' && a.rateLimitUntil) ? `free ${timeAgo(a.rateLimitUntil)}` : '',
    ].filter(Boolean).join(' · ');

    const switchBtn = isUsing
      ? `<span class="running-spinner" title="Running"></span>`
      : `<button class="btn-switch" onclick="switchAccount('${a.id}')">Switch</button>`;
    const removeBtn = isUsing
      ? ''
      : `<button class="btn-remove" onclick="removeAccount('${a.id}')">Xóa</button>`;

    return `<div class="account-card ${cardCls}">
      <div class="avatar">${(a.email || '?')[0].toUpperCase()}</div>
      <div class="account-info">
        <div class="email">${a.email}</div>
        <div class="meta">${meta}</div>
        ${accountUsageBars(a)}
      </div>
      <div class="actions">
        ${switchBtn}
        ${removeBtn}
      </div>
    </div>`;
  }).join('');
}

function renderStats(accounts) {
  const using   = accounts.filter(a => a.selected && !['rate_limited','expired'].includes(a.status)).length;
  const active  = accounts.filter(a => a.status === 'active').length;
  const limited = accounts.filter(a => a.status === 'rate_limited').length;
  const totalReqs = accounts.reduce((s, a) => s + (a.requestCount || 0), 0);
  document.getElementById('stat-active').textContent   = using || active;
  document.getElementById('stat-limited').textContent  = limited;
  document.getElementById('stat-requests').textContent = totalReqs.toLocaleString();
  document.getElementById('stat-total').textContent    = accounts.length;
}

async function fetchAccounts() {
  try {
    const accounts = await fetch('/api/accounts').then(r => r.json());
    latestAccounts = accounts;
    latestAccountsFetchedAt = Date.now();
    renderAccounts(latestAccounts);
    renderStats(latestAccounts);
    document.getElementById('server-badge').textContent = 'Online';
    document.getElementById('server-badge').className = 'badge';
  } catch {
    document.getElementById('server-badge').textContent = 'Offline';
    document.getElementById('server-badge').className = 'badge offline';
  }
}

function tickAccountCountdowns() {
  if (!latestAccounts.length) return;
  renderAccounts(latestAccounts);
}

async function switchAccount(id) {
  const res = await fetch(`/api/accounts/${id}/select`, { method: 'POST' });
  const data = await res.json();
  if (!res.ok) { alert('Lỗi: ' + (data.error ?? 'unknown')); return; }
  fetchAccounts();
}

async function removeAccount(id) {
  if (!confirm('Xóa tài khoản này?')) return;
  const res = await fetch(`/api/accounts/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) {
    alert('Lỗi: ' + (data.error ?? 'unknown'));
    return;
  }
  fetchAccounts();
}

// ── SSE log ───────────────────────────────────────────────────────────────────
const MAX_ROWS = 200;

function statusCls(s) {
  if (s === 401 || s === 403) return 'lc-4xx';
  if (s === 429)              return 'lc-429';
  if (s >= 500)               return 'lc-5xx';
  if (s >= 400)               return 'lc-4xx';
  return 'lc-ok';
}

function rowCls(entry) {
  if (entry.type === 'account_switched') return 'log-row ev-switch';
  if (['account_added','account_updated','account_selected','token_usage'].includes(entry.type)) return 'log-row ev-account';
  if (entry.error || entry.type === 'stream_error') return 'log-row err-4xx';
  if (entry.status === 429) return 'log-row err-429';
  if (entry.status >= 500)  return 'log-row err-5xx';
  if (entry.status >= 400)  return 'log-row err-4xx';
  return 'log-row';
}

function fmtNum(n) {
  return Number.isFinite(n) ? n.toLocaleString('vi-VN') : '-';
}

function formatEntry(e) {
  const t = new Date(e.timestamp).toLocaleTimeString('vi-VN', { hour12: false });

  if (e.type === 'account_switched') {
    return `<div class="${rowCls(e)}">
      <span class="lc-time">${t}</span>
      <span class="lc-sw-label"> ⇄ SWITCH </span>
      <span class="lc-sw-from">${e.from}</span>
      <span class="lc-arrow"> → </span>
      <span class="lc-sw-to">${e.to}</span>
      <span class="lc-sw-reason"> [${e.reason}]</span>
    </div>`;
  }
  if (e.type === 'account_added') {
    return `<div class="${rowCls(e)}">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-add"> + NEW ACCOUNT </span>
      <span class="lc-email">${e.email}</span>
    </div>`;
  }
  if (e.type === 'account_updated') {
    return `<div class="${rowCls(e)}">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-upd"> ↻ TOKEN REFRESH </span>
      <span class="lc-email">${e.email}</span>
    </div>`;
  }
  if (e.type === 'account_selected') {
    return `<div class="${rowCls(e)}">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-sel"> ▶ SELECTED </span>
      <span class="lc-email">${e.email}</span>
    </div>`;
  }
  if (e.type === 'config_proxy') {
    return `<div class="log-row ev-account">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-info"> CONFIG </span>
      <span class="lc-email">${e.enabled ? 'proxy enabled' : 'proxy disabled'}</span>
    </div>`;
  }
  if (e.type === 'logs_connected') {
    return `<div class="log-row ev-account">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-info"> LOGS </span>
      <span class="lc-email">connected</span>
    </div>`;
  }
  if (e.type === 'token_usage') {
    const u = e.usage || {};
    const total = fmtNum(u.totalTokens);
    const input = fmtNum(u.inputTokens);
    const cached = fmtNum(u.cachedInputTokens);
    const output = fmtNum(u.outputTokens);
    const reasoning = fmtNum(u.reasoningTokens);
    return `<div class="${rowCls(e)}">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-info"> TOKENS </span>
      <span class="lc-path">${e.path||''}</span>
      <span class="lc-email">total ${total} · in ${input} · cached ${cached} · out ${output} · reasoning ${reasoning}</span>
    </div>`;
  }
  if (e.type && e.type.startsWith('login_')) {
    const isErr = e.error || e.status >= 400 || ['login_error','login_exception','login_timeout','login_import_error'].includes(e.type);
    const label = e.type.replace('login_', '').replace(/_/g, ' ').toUpperCase();
    const detail = [
      e.status ? `${e.status}` : '',
      e.contentType || '',
      e.email || '',
      e.message || '',
      e.error || '',
    ].filter(Boolean).join(' ');
    let html = `<div class="${isErr ? 'log-row err-4xx' : 'log-row ev-account'}">
      <span class="lc-time">${t}</span>
      <span class="${isErr ? 'lc-ev-err' : 'lc-ev-info'}"> LOGIN ${label} </span>
      <span class="lc-email">${detail}</span>
    </div>`;
    if (e.body) {
      const body = String(e.body).replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += `<div class="err-snippet">${body}</div>`;
    }
    return html;
  }

  if (e.type === 'ws_open') {
    return `<div class="log-row ev-account">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-info"> WS↑ </span>
      <span class="lc-path">/v1/responses</span>
      <span class="lc-email"> ${e.email||''}</span>
    </div>`;
  }
  if (e.type === 'ws_close') {
    const ok = e.code === 1000 || e.code === 1001;
    return `<div class="log-row ${ok ? 'ev-account' : 'err-4xx'}">
      <span class="lc-time">${t}</span>
      <span class="${ok ? 'lc-ev-info' : 'lc-ev-err'}"> WS↓ </span>
      <span class="lc-path">/v1/responses</span>
      <span class="lc-status-2xx"> ${e.code}</span>
      <span class="lc-lat"> ${e.latencyMs ? e.latencyMs+'ms' : ''}</span>
      <span class="lc-email"> ${e.email||''}</span>
    </div>`;
  }
  if (e.type === 'ws_error') {
    return `<div class="log-row err-4xx">
      <span class="lc-time">${t}</span>
      <span class="lc-ev-err"> WS ERR </span>
      <span class="lc-path">/v1/responses</span>
      <span class="lc-email"> ${e.email||''}</span>
    </div>`;
  }

  // ── Request row ──────────────────────────────────────────────────────────
  const sc = statusCls(e.status);
  let badge = '';
  if (e.unhandled && !e.proxied) badge = '<span class="badge-unhandled">unhandled</span>';
  else if (e.unhandled)          badge = `<span class="badge-fallback">fallback→${e.target||'?'}</span>`;

  const swNote = e.accountSwitched
    ? `<span class="lc-sw-label"> ⇄</span><span class="lc-sw-from">${e.accountSwitched.from}</span><span class="lc-arrow">→</span><span class="lc-sw-to">${e.accountSwitched.to}</span>`
    : '';
  const usageNote = e.usage
    ? `<span class="lc-email"> tokens ${fmtNum(e.usage.totalTokens)}</span>`
    : '';

  let html = `<div class="${rowCls(e)}">
    <span class="lc-time">${t}</span>
    <span class="lc-method"> ${e.method||''} </span>
    <span class="lc-path">${e.path||''}</span>
    <span class="${sc}"> ${e.status}</span>
    <span class="lc-lat"> ${e.latencyMs ? e.latencyMs+'ms' : ''}</span>
    <span class="lc-email"> ${e.email||''}</span>
    ${badge}${swNote}${usageNote}
  </div>`;

  if (e.errorSnippet) {
    const snip = e.errorSnippet.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += `<div class="err-snippet">${snip}</div>`;
  }
  return html;
}

function connectLogs() {
  const es = new EventSource('/api/logs/stream');
  const box = document.getElementById('log-box');

  es.onmessage = (ev) => {
    const entry = JSON.parse(ev.data);

    if (entry.type && entry.type !== 'request') {
      fetchAccounts();
      if (entry.type.startsWith('login_')) updateLoginStatus();
      if (entry.type === 'config_proxy') updateConfigProxyStatus();
    }

    const html = formatEntry(entry);
    if (!html) return;

    // Clear placeholder
    if (box.querySelector('.lc-time')?.parentElement === box) {
      const p = box.querySelector(':scope > .lc-time');
      if (p && box.children.length === 1) box.innerHTML = '';
    }

    box.insertAdjacentHTML('afterbegin', html);
    while (box.children.length > MAX_ROWS) box.removeChild(box.lastChild);
  };

  es.onerror = () => setTimeout(connectLogs, 3000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
fetchAccounts();
updateLoginStatus();
updateConfigProxyStatus();
setInterval(fetchAccounts, 30000);
setInterval(tickAccountCountdowns, 1000);
setInterval(updateLoginStatus, 6000);
setInterval(updateConfigProxyStatus, 6000);
connectLogs();
</script>
</body>
</html>
